<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学小探险 - 智能导学系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="top-nav">
        <h1 class="logo">数学小探险</h1>
        <nav class="module-tabs" id="moduleTabs">
            <button class="tab active" data-module="geometry">几何图形</button>
            <button class="tab" data-module="fraction">分数认识</button>
            <button class="tab" data-module="transform">平移旋转</button>
            <button class="tab" data-module="segment">线段图</button>
        </nav>
        <button class="llm-config-btn" id="openLlmConfig" title="LLM 配置">
            <span class="icon">⚙</span>
            <span>LLM配置</span>
        </button>
    </header>

    <!-- 主体区域 -->
    <main class="main-area">
        <!-- Canvas 画布区 -->
        <section class="canvas-panel" id="canvasPanel">
            <canvas id="mainCanvas"></canvas>
            <div class="canvas-placeholder" id="canvasPlaceholder">
                <div class="placeholder-icon">✋</div>
                <p>拖拽图形元素来探索数学的奥秘</p>
                <p class="placeholder-hint">试试拖拽顶点、切分图形、旋转变换……</p>
            </div>
        </section>

        <!-- 对话面板 -->
        <aside class="chat-panel" id="chatPanel">
            <div class="chat-header">
                <span class="chat-icon">🤖</span>
                <span>智能导学 · 小Q</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message system">
                    <p>你好！我是小Q，你的数学导学助手。</p>
                    <p>选一个模块，开始动手操作吧！</p>
                </div>
            </div>
            <div class="chat-input-area">
                <input
                    type="text"
                    id="chatInput"
                    placeholder="输入问题，或者直接动手操作……"
                    autocomplete="off"
                />
                <button id="sendBtn" title="发送">➤</button>
            </div>
        </aside>
    </main>

    <!-- 底部工具栏 -->
    <footer class="bottom-bar" id="bottomBar">
        <div class="toolbar-left">
            <span class="toolbar-label" id="toolbarLabel">工具：</span>
            <div id="moduleToolbar"></div>
        </div>
        <div class="toolbar-right">
            <button id="resetBtn" title="重置画布">↺ 重置</button>
            <button id="helpBtn" title="帮助">? 帮助</button>
        </div>
    </footer>

    <!-- LLM 设置弹窗 -->
    <div class="modal-overlay" id="llmConfigModal">
        <div class="modal-content">
            <div class="config-header">
                <div class="config-header-icon">🤖</div>
                <h2>LLM 配置</h2>
            </div>
            <div class="config-form">
                <div class="form-group">
                    <label>API Endpoint</label>
                    <input type="text" id="cfgEndpoint" placeholder="https://api.deepseek.com/v1/chat/completions" />
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="cfgApiKey" placeholder="sk-..." />
                    <span class="config-hint">Key 仅存储在本地浏览器中</span>
                </div>
                <div class="form-group">
                    <label>Model</label>
                    <input type="text" id="cfgModel" placeholder="deepseek-v4-flash" />
                </div>
            </div>
            <div class="config-actions">
                <button class="modal-btn-secondary" id="llmConfigCancel">取消</button>
                <button class="modal-btn-primary" id="llmConfigSave">保存</button>
            </div>
        </div>
    </div>

    <!-- 帮助弹窗 -->
    <div class="modal-overlay" id="helpModal">
        <div class="modal-content">
            <h2>操作帮助</h2>
            <div id="helpContent"></div>
            <button class="modal-close" id="closeHelp">知道了</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/canvas-engine.js"></script>
    <script src="js/main.js"></script>
    <script src="js/llm-client.js"></script>
    <script src="js/ui/chat.js"></script>
    <script src="js/ui/toolbar.js"></script>
    <script src="js/modules/geometry.js"></script>
    <script src="js/modules/fraction.js"></script>
    <script src="js/modules/transform.js"></script>
    <script src="js/modules/segment.js"></script>

    <!-- LLM 配置按钮直接绑定 -->
    <script>
        document.getElementById('openLlmConfig').onclick = function() {
            console.log('Opening LLM config modal');
            var modal = document.getElementById('llmConfigModal');
            var cfgEndpoint = document.getElementById('cfgEndpoint');
            var cfgApiKey = document.getElementById('cfgApiKey');
            var cfgModel = document.getElementById('cfgModel');

            // 加载当前配置
            var stored = localStorage.getItem('llm_config');
            if (stored) {
                var cfg = JSON.parse(stored);
                cfgEndpoint.value = cfg.apiEndpoint || 'https://api.deepseek.com/v1/chat/completions';
                cfgApiKey.value = cfg.apiKey || '';
                cfgModel.value = cfg.model || 'deepseek-v4-flash';
            } else {
                cfgEndpoint.value = 'https://api.deepseek.com/v1/chat/completions';
                cfgApiKey.value = '';
                cfgModel.value = 'deepseek-v4-flash';
            }

            modal.classList.add('show');
        };

        document.getElementById('llmConfigSave').onclick = function() {
            console.log('Saving LLM config');
            var cfgEndpoint = document.getElementById('cfgEndpoint').value.trim() || 'https://api.deepseek.com/v1/chat/completions';
            var cfgApiKey = document.getElementById('cfgApiKey').value.trim();
            var cfgModel = document.getElementById('cfgModel').value.trim() || 'deepseek-v4-flash';

            var config = {
                apiEndpoint: cfgEndpoint,
                apiKey: cfgApiKey,
                model: cfgModel
            };

            localStorage.setItem('llm_config', JSON.stringify(config));

            // 更新 CONFIG 对象
            CONFIG.apiEndpoint = cfgEndpoint;
            CONFIG.apiKey = cfgApiKey;
            CONFIG.model = cfgModel;

            console.log('Config saved:', config);

            document.getElementById('llmConfigModal').classList.remove('show');
            alert('配置已保存！');
        };

        document.getElementById('llmConfigCancel').onclick = function() {
            document.getElementById('llmConfigModal').classList.remove('show');
        };

        // 点击弹窗背景关闭
        document.getElementById('llmConfigModal').onclick = function(e) {
            if (e.target === this) {
                this.classList.remove('show');
            }
        };
    </script>
</body>
</html>
